# Curated pilot-identity decisions (issue #9).
#
# The build reads this on every rebuild and applies it deterministically, so a
# decision recorded once holds for all time. Every entry keys on a STABLE
# upstream identifier: a pilot id or a deck id. Never key on a display name or a
# synthetic key (nan:darcy, LunarRedFalcon#2): those shift when the data changes.
#
# Wave 1 policy: only decisions grounded on a hard fact go here. When two names
# could reasonably be two different people, they stay separate and remain a
# proposal in the reconciliation report until a human confirms them (the second
# sweep). See docs/adr/0004-pilot-identity.md.
#
# Six kinds of decision:
#
#   [[merge]]        collapse several ids onto one person (transitive)
#     ids = ["A", "B", "C"]   # every upstream id that is this person
#     canonical = "A"         # the id the merged Pilot node keeps (one of `ids`)
#
#   [[reject]]       these ids are NOT the same person; stop re-proposing them
#     ids = ["A", "B"]
#
#   [[split]]        these ids share a display name but are different people;
#                    keep the identical-name join from fusing them (inverse of
#                    merge). Split every id in a same-name group you separate:
#                    splitting only some leaves the rest transitively re-fusing
#                    them, which aborts the build.
#     ids = ["A", "B"]
#
#   [[name]]         pin a display name over the majority vote
#     pilot = "CleverBlueWhale"
#     display_name = "Alejandro D"
#
#   [[deck_pilot]]   reassign one deck to its real pilot id (e.g. a null deck)
#     deck = "<deckId>"
#     pilot = "<pilotId>"
#
#   [[deck_archetype]] reclassify one deck whose source title mislabelled it
#     deck = "<deckId>"
#     deck_name = "UR Prowess"          # the corrected display name
#     engine = "engine:izzet_prowess"   # the single engine it belongs to
#     engine_label = "Izzet Prowess"    # that engine's label

# --- Names pinned against the vote (no derivable relation, human-confirmed) ---

[[name]]
# The handle "alejandrofp" carries no recoverable link to the real name.
pilot = "CleverBlueWhale"
display_name = "Alejandro D"

[[name]]
# The source's deck name ("L Naya Initiative") swallowed the surname initial, so
# name recovery subtracted it and lost the "L". The person is Wan Chin L; the
# deck is Naya Initiative. (Deck name is a source field, corrected separately.)
pilot = "FlyingMagentaLynx"
display_name = "Wan Chin L"

